<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>67</title>

<style>
div {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 100vh;
}

h1 {
    margin: 0;
    font-size: 1000px;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
}

span {
    display: inline-block;
}

/* 6 */
span:nth-child(1) {
    animation: bounce1 0.4s infinite;
}

/* 7 */
span:nth-child(2) {
    animation: bounce2 0.4s infinite;
}

@keyframes bounce1 {
    0%, 50%, 100% { transform: translateY(0); }
    25% { transform: translateY(-200px); }
}

@keyframes bounce2 {
    0%, 50%, 100% { transform: translateY(0); }
    75% { transform: translateY(-200px); }
}

@media (max-width: 500px) {
    h1 {
        font-size: 300px;
    }
}
</style>
</head>

<body>

<div>
    <h1>
        <span>6</span><span>7</span>
    </h1>
</div>

</body>
</html>
