<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Drag & Drop Immagine</title>

  <style>
    #drop-area {
      width: 300px;
      height: 200px;
      border: 2px dashed #ccc;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #888;
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }

    #drop-area.hover {
      border-color: red;
      color: red;
    }

    #drop-area img {
      max-width: 100%;
      max-height: 100%;
      transition: transform 0.3s;
    }

    .controls {
      margin-top: 10px;
      display: none;
      gap: 10px;
    }

    .controls button {
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="drop-area">
  Trascina un'immagine qui<br>oppure clicca
</div>
<input type="file" id="fileElem" accept="image/*">

<div class="controls" id="controls">
  <button id="rotateBtn">Ruota 90°</button>
  <button id="deleteBtn">Elimina</button>
</div>

<script>
  const dropArea = document.getElementById("drop-area");
  const fileInput = document.getElementById("fileElem");
  const controls = document.getElementById("controls");
  const rotateBtn = document.getElementById("rotateBtn");
  const deleteBtn = document.getElementById("deleteBtn");

  let currentImage = null;
  let rotation = 0;

  dropArea.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", (e) => {
    handleFile(e.target.files[0]);
  });

  dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("hover");
  });

  dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("hover");
  });

  dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("hover");
    handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) {
      alert("Carica un'immagine valida!");
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      rotation = 0;
      dropArea.innerHTML = `<img id="preview" src="${e.target.result}">`;
      currentImage = document.getElementById("preview");
      controls.style.display = "flex";
    };
    reader.readAsDataURL(file);
  }

  // ROTAZIONE
  rotateBtn.addEventListener("click", () => {
    if (!currentImage) return;
    rotation += 90;
    currentImage.style.transform = `rotate(${rotation}deg)`;
  });

  // ELIMINA
  deleteBtn.addEventListener("click", () => {
    dropArea.innerHTML = "Trascina un'immagine qui<br>oppure clicca";
    controls.style.display = "none";
    currentImage = null;
    rotation = 0;
  });
</script>

</body>
</html>
