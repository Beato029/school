<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

        <style>
        :root {
            --primary: #2c3e50;
            --accent-prosa: #e67e22;
            --accent-visual: #8e44ad;
            --accent-rhetoric: #c0392b;
            --accent-themes: #2980b9;
            --bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
        }

        .btn-print {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 10px;
            background: var(--primary);
            color: white;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
        }

        .student-info {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }

        h2 {
            border-left: 5px solid var(--primary);
            padding-left: 10px;
            margin-top: 40px;
        }

        .section {
            margin-top: 10px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        .grid-item {
            background: #fafafa;
            padding: 8px;
            border-radius: 5px;
        }

        input[type="checkbox"] {
            margin-right: 8px;
        }

        @media print {
            .btn-print { display: none; }
            body { background: white; }
        }
    </style>

</head>
<body>
    
    <div class="btn-print" onclick="window.print()">
        Stampa
    </div>

</body>
</html>
