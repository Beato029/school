<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Editor Immagine</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
  }

  #drop-area {
    width: 300px;
    height: 300px;
    border: 2px dashed #ccc;
    border-radius: 10px;

    display: flex;
    align-items: center;
    justify-content: center;

    margin: 20px auto;
    cursor: pointer;
    overflow: hidden;
  }

  #drop-area.hover {
    border-color: #8e44ad;
    color: #8e44ad;
  }

  #drop-area img {
    max-width: 100%;
    max-height: 100%;
    transition: all 0.3s ease;
  }

  .controls {
    display: none;
    justify-content: center;
    gap: 10px;
    margin: 10px;
  }

  .options {
    margin-top: 10px;
  }

  label {
    margin: 0 10px;
  }
</style>

</head>
<body>

<h2>Drag & Drop Immagine</h2>

<div id="drop-area">
  Trascina immagine o clicca
</div>
<input type="file" id="fileElem" accept="image/*">

<div class="controls" id="controls">
  <button id="rotateBtn">Ruota 90°</button>
  <button id="deleteBtn">Elimina</button>
</div>

<div class="options">
  <label><input type="checkbox" id="grayscale"> Bianco e nero</label>
  <label><input type="checkbox" id="blur"> Sfocatura</label>
  <label><input type="checkbox" id="rotateCheck"> Ruota (checkbox)</label>
</div>

<script>
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileElem");
const controls = document.getElementById("controls");

const rotateBtn = document.getElementById("rotateBtn");
const deleteBtn = document.getElementById("deleteBtn");

const grayscale = document.getElementById("grayscale");
const blur = document.getElementById("blur");
const rotateCheck = document.getElementById("rotateCheck");

let currentImage = null;
let rotation = 0;

// CLICK
dropArea.addEventListener("click", () => fileInput.click());

// FILE INPUT
fileInput.addEventListener("change", (e) => {
  handleFile(e.target.files[0]);
});

// DRAG
dropArea.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropArea.classList.add("hover");
});

dropArea.addEventListener("dragleave", () => {
  dropArea.classList.remove("hover");
});

dropArea.addEventListener("drop", (e) => {
  e.preventDefault();
  dropArea.classList.remove("hover");
  handleFile(e.dataTransfer.files[0]);
});

// CARICAMENTO
function handleFile(file) {
  if (!file || !file.type.startsWith("image/")) {
    alert("Carica un'immagine valida!");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    rotation = 0;
    dropArea.innerHTML = `<img id="preview" src="${e.target.result}">`;
    currentImage = document.getElementById("preview");
    controls.style.display = "flex";
    updateEffects();
  };
  reader.readAsDataURL(file);
}

// ROTAZIONE BOTTONE
rotateBtn.addEventListener("click", () => {
  if (!currentImage) return;
  rotation += 90;
  updateEffects();
});

// ELIMINA
deleteBtn.addEventListener("click", () => {
  dropArea.innerHTML = "Trascina immagine o clicca";
  controls.style.display = "none";
  currentImage = null;
  rotation = 0;
});

// CHECKBOX EFFECTS
function updateEffects() {
  if (!currentImage) return;

  let filters = [];

  if (grayscale.checked) filters.push("grayscale(100%)");
  if (blur.checked) filters.push("blur(5px)");

  currentImage.style.filter = filters.join(" ");

  let totalRotation = rotation;
  if (rotateCheck.checked) totalRotation += 90;

  currentImage.style.transform = `rotate(${totalRotation}deg)`;
}

// EVENTI CHECKBOX
grayscale.addEventListener("change", updateEffects);
blur.addEventListener("change", updateEffects);
rotateCheck.addEventListener("change", updateEffects);

</script>

</body>
</html>
